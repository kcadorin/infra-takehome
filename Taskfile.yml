version: "3"

vars:
  DOCKER_HOST: "unix://{{.HOME}}/.docker/run/docker.sock"
  TOFU_DIR: tofu

env:
  DOCKER_HOST: "{{.DOCKER_HOST}}"

tasks:
# Haven't tested this, only one at a time
  up:
    desc: "Spin up the full stack (terraform + ArgoCD + PostgREST)"
    cmds:
      - task: terraform-phase1
      - task: kubeconfig-merge
      - task: terraform-phase2
      - task: argocd-install
      - task: argocd-deploy

  terraform-init:
    desc: "Initialize terraform providers"
    dir: "{{.TOFU_DIR}}"
    cmds:
      - terraform init -input=false

  terraform-phase1:
    desc: "Create k3d cluster and Postgres (phase 1)"
    deps: [terraform-init]
    dir: "{{.TOFU_DIR}}"
    cmds:
      - terraform apply -auto-approve
          -var="docker_host={{.DOCKER_HOST}}"
          -target=terraform_data.k3d_cluster
          -target=docker_image.postgres
          -target=docker_volume.postgres_data
          -target=docker_container.postgres
          -target=terraform_data.postgres_ready
          -target=random_password.postgrest_superuser
          -target=postgresql_database.postgrest
          -target=postgresql_role.postgrest_superuser

  terraform-phase2:
    desc: "Create Kubernetes namespace and secret (phase 2)"
    dir: "{{.TOFU_DIR}}"
    cmds:
      - terraform apply -auto-approve -var="docker_host={{.DOCKER_HOST}}"

  kubeconfig-merge:
    desc: "Merge k3d context into ~/.kube/config"
    cmds:
      - k3d kubeconfig merge infra-takehome --output ~/.kube/config --kubeconfig-switch-context

  argocd-install:
    desc: "Install ArgoCD into the k3d cluster"
    cmds:
      - kubectl --context k3d-infra-takehome apply --server-side -k argocd/
      - kubectl --context k3d-infra-takehome -n argocd rollout status deployment/argocd-server --timeout=120s

  argocd-deploy:
    desc: "Deploy via ArgoCD"
    cmds:
      - kubectl --context k3d-infra-takehome apply -f argocd/postgrest-app.yaml
